name: Validate PR

on:
  pull_request:
    branches: [develop, main]

jobs:
  check-pr-template:
    name: PR Template Filled
    runs-on: ubuntu-latest
    steps:
      - name: Check PR body is not empty
        if: github.event.pull_request.body == ''
        run: |
          echo "PR description is empty. Please fill out the PR template."
          exit 1

  check-branch-name:
    name: Branch Naming Convention
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ ! "$BRANCH" =~ ^(arch|levels|art|audio|chore|docs|hotfix)/ ]]; then
            echo "Branch '$BRANCH' does not follow naming convention."
            echo "Expected: arch/, levels/, art/, audio/, chore/, docs/, or hotfix/"
            exit 1
          fi
          echo "Branch name '$BRANCH' is valid."

  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run TypeScript type check
        run: npm run typecheck

  check-interface-ownership:
    name: Interface File Change Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for interface file changes
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          INTERFACE_CHANGES=$(echo "$CHANGED" | grep -E 'game/core/systems/I.*\.ts|game/core/services/I.*\.ts' || true)
          if [ -n "$INTERFACE_CHANGES" ]; then
            echo "::warning::Interface files were modified in this PR:"
            echo "$INTERFACE_CHANGES"
            echo ""
            echo "Interface changes are CROSS-DOMAIN BREAKING CHANGES."
            echo "This PR REQUIRES sign-off from ALL domain owners."
            echo "Ensure a Cross-Domain Interface issue was opened and approved before merging."
          fi

